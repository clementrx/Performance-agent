repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd apps/api && uv run ruff check --fix .'
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd apps/api && uv run ruff format .'
        language: system
        types: [python]
        pass_filenames: false
      - id: ty
        name: ty check
        entry: bash -c 'cd apps/api && uv run ty check'
        language: system
        types: [python]
        pass_filenames: false
