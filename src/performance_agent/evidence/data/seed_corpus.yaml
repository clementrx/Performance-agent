# PerformanceAgent seed corpus.
#
# Every entry here has been verified against Crossref (live query, one DOI at a
# time) by a maintainer per performance_agent/evidence/verify.py. Titles,
# authors, years, journals, and DOIs are copied verbatim from the Crossref API
# response for the given DOI; conclusions are the maintainer's own
# conservative summary of the registry metadata (title, and abstract where
# Crossref provided one). Do not add entries from memory — see
# docs/superpowers/plans/2026-07-10-plan-04-evidence-corpus.md Task 5.

- id: strength-training-running-economy-meta-2024
  title: "Effect of Strength Training Programs in Middle- and Long-Distance Runners' Economy at Different Running Speeds: A Systematic Review with Meta-analysis"
  authors: [Llanos-Lagos C, Ramirez-Campillo R, Moran J, "Sáez de Villarreal E"]
  year: 2024
  journal: Sports Medicine
  study_type: meta_analysis
  population: Middle- and long-distance runners
  conclusions: >
    A systematic review with meta-analysis found that high-load, plyometric, and combined
    strength training improved running economy in middle- and long-distance runners versus
    control conditions, while submaximal-load and isometric strength training showed no
    consistent improvement.
  evidence_level: strong
  doi: 10.1007/s40279-023-01978-y
  verified: true

- id: strength-training-distance-running-review-2018
  title: "Effects of Strength Training on the Physiological Determinants of Middle- and Long-Distance Running Performance: A Systematic Review"
  authors: [Blagrove RC, Howatson G, Hayes PR]
  year: 2018
  journal: Sports Medicine
  study_type: systematic_review
  population: Middle- and long-distance runners
  conclusions: >
    A systematic review examined how strength training affects physiological determinants
    of middle- and long-distance running performance, such as running economy and
    neuromuscular function.
  evidence_level: moderate
  doi: 10.1007/s40279-017-0835-7
  verified: true

