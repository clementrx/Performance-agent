# PerformanceAgent seed corpus.
#
# Every entry here has been verified against a live registry (Crossref by DOI,
# or PubMed by PMID) by a maintainer per performance_agent/evidence/verify.py.
# Titles, authors, years, journals, and DOIs/PMIDs are copied verbatim from the
# registry response for the given locator. Conclusions are the maintainer's own
# conservative summary, faithful to the registry abstract where one was
# available (Crossref, or PubMed efetch) — no figure appears here that is not in
# that abstract. Do not add entries from memory — see
# docs/superpowers/plans/2026-07-10-plan-04-evidence-corpus.md Task 5.

- id: strength-training-running-economy-meta-2024
  title: "Effect of Strength Training Programs in Middle- and Long-Distance Runners' Economy at Different Running Speeds: A Systematic Review with Meta-analysis"
  authors: [Llanos-Lagos C, Ramirez-Campillo R, Moran J, "Sáez de Villarreal E"]
  year: 2024
  journal: Sports Medicine
  study_type: meta_analysis
  population: Middle- and long-distance runners
  conclusions: >
    A systematic review with meta-analysis found that high-load, plyometric, and combined
    strength training may improve running economy in middle- and long-distance runners
    versus control conditions, while submaximal-load and isometric strength training were
    less effective.
  # grading rationale: meta-analysis, but the authors' own GRADE certainty was moderate
  # (and low for combined methods), so graded moderate rather than at the meta-analysis ceiling.
  evidence_level: moderate
  doi: 10.1007/s40279-023-01978-y
  verified: true

- id: strength-training-distance-running-review-2018
  title: "Effects of Strength Training on the Physiological Determinants of Middle- and Long-Distance Running Performance: A Systematic Review"
  authors: [Blagrove RC, Howatson G, Hayes PR]
  year: 2018
  journal: Sports Medicine
  study_type: systematic_review
  population: Middle- and long-distance runners
  conclusions: >
    A systematic review of 24 studies reported good evidence that strength training improves
    running economy, time-trial, and sprint performance in middle- and long-distance runners,
    though the effect was not consistent across all studies.
  # grading rationale: systematic review, but the abstract flags inconsistent findings and
  # modest study quality (PEDro 4-6); graded moderate, below the systematic-review ceiling.
  evidence_level: moderate
  doi: 10.1007/s40279-017-0835-7
  verified: true

- id: tapering-performance-meta-2007
  title: "Effects of Tapering on Performance: A Meta-Analysis"
  authors: [Bosquet L, Montpetit J, Arvisais D, Mujika I]
  year: 2007
  journal: Medicine & Science in Sports & Exercise
  study_type: meta_analysis
  conclusions: >
    A meta-analysis of 27 studies found that tapering improved competitive performance, with
    a roughly two-week taper that exponentially reduces training volume by 41-60% (holding
    intensity and frequency constant) reported as the most effective strategy.
  # grading rationale: meta-analysis with significant but small-to-moderate pooled effect
  # sizes (0.33-0.72); graded moderate conservatively.
  evidence_level: moderate
  doi: 10.1249/mss.0b013e31806010e0
  verified: true

- id: session-rpe-training-load-2001
  title: A New Approach to Monitoring Exercise Training
  authors: [Foster C, Florhaug JA, Franklin J, Gottschall L, Hrovatin LA, Parker S, Doleshal P, Dodge C]
  year: 2001
  journal: Journal of Strength and Conditioning Research
  study_type: cross_sectional
  conclusions: >
    This study introduced and evaluated a session-RPE method for monitoring exercise training
    load, proposing it as a practical approach to quantifying training stress.
  # grading rationale: single methodological/validation study of a monitoring tool; limited by
  # its cross-sectional design.
  evidence_level: limited
  doi: 10.1519/00124278-200102000-00019
  verified: true

- id: resistance-training-volume-hypertrophy-meta-2017
  title: "Dose-response relationship between weekly resistance training volume and increases in muscle mass: A systematic review and meta-analysis"
  authors: [Schoenfeld BJ, Ogborn D, Krieger JW]
  year: 2017
  journal: Journal of Sports Sciences
  study_type: meta_analysis
  conclusions: >
    A systematic review and meta-analysis examined the dose-response relationship between
    weekly resistance-training volume and increases in muscle mass.
  # grading rationale: meta-analysis, but no registry abstract was available to assess the
  # consistency or magnitude of the finding; graded moderate conservatively and kept non-directional.
  evidence_level: moderate
  doi: 10.1080/02640414.2016.1210197
  verified: true

- id: resistance-training-frequency-strength-meta-2018
  title: "Effect of Resistance Training Frequency on Gains in Muscular Strength: A Systematic Review and Meta-Analysis"
  authors: [Grgic J, Schoenfeld BJ, Davies TB, Lazinica B, Krieger JW, Pedisic Z]
  year: 2018
  journal: Sports Medicine
  study_type: meta_analysis
  conclusions: >
    A systematic review and meta-analysis of 22 studies found that higher resistance-training
    frequencies were associated with greater muscular strength gains, but this effect appeared
    to be driven primarily by training volume, with no significant frequency effect once volume
    was equated.
  # grading rationale: meta-analysis, but the abstract notes the effect is confounded by volume
  # and most included studies used untrained participants; graded moderate.
  evidence_level: moderate
  doi: 10.1007/s40279-018-0872-x
  verified: true

- id: acute-chronic-workload-ratio-injury-cohort-2016
  title: "The acute:chronic workload ratio predicts injury: high chronic workload may decrease injury risk in elite rugby league players"
  authors: [Hulin BT, Gabbett TJ, Lawson DW, Caputi P, Sampson JA]
  year: 2016
  journal: British Journal of Sports Medicine
  study_type: cohort
  population: Elite rugby league players
  conclusions: >
    In a two-season prospective cohort of 53 elite rugby league players, very-high
    acute:chronic workload ratios were associated with the greatest injury risk, while
    chronic workload alone did not consistently predict injury.
  # grading rationale: single-sport, single-cohort observational study; graded limited, below
  # the cohort ceiling, because findings may not generalize to other athlete populations.
  evidence_level: limited
  doi: 10.1136/bjsports-2015-094817
  verified: true

- id: hiit-vs-continuous-training-vo2max-meta-2015
  title: "Effectiveness of High-Intensity Interval Training (HIT) and Continuous Endurance Training for VO2max Improvements: A Systematic Review and Meta-Analysis of Controlled Trials"
  authors: [Milanović Z, Sporiš G, Weston M]
  year: 2015
  journal: Sports Medicine
  study_type: meta_analysis
  population: Healthy young to middle-aged adults
  conclusions: >
    A meta-analysis of 28 controlled trials found that both high-intensity interval training
    and continuous endurance training produced large improvements in VO2max in healthy young
    to middle-aged adults, with somewhat greater gains following interval training.
  # grading rationale: meta-analysis, but the between-modality advantage for interval training
  # was only a "possibly small" effect under magnitude-based inference; graded moderate.
  evidence_level: moderate
  doi: 10.1007/s40279-015-0365-0
  verified: true

- id: plyometric-training-vertical-jump-meta-2007
  title: "Does plyometric training improve vertical jump height? A meta-analytical review"
  authors: [Markovic G]
  year: 2007
  journal: British Journal of Sports Medicine
  study_type: meta_analysis
  population: Healthy individuals
  conclusions: >
    A meta-analysis of 26 studies found that plyometric training produced statistically
    significant improvements in vertical jump height across squat jump, countermovement
    jump, countermovement jump with arm swing, and drop jump tests, with the largest mean
    effect for the countermovement jump (about 8.7%).
  # grading rationale: meta-analysis of 26 controlled trials with consistent, statistically
  # significant pooled effects across all four jump types and no author-flagged certainty
  # concerns; graded strong.
  evidence_level: strong
  doi: 10.1136/bjsm.2007.035113
  verified: true

- id: resistance-training-progression-acsm-position-stand-2002
  title: "American College of Sports Medicine position stand. Progression models in resistance training for healthy adults."
  authors: [Kraemer WJ, Adams K, Cafarelli E, Dudley GA, Dooly C, Feigenbaum MS, Fleck SJ, Franklin B, Fry AC, Hoffman JR, Newton RU, Potteiger J, Stone MH, Ratamess NA, Triplett-McBride T]
  year: 2002
  journal: Medicine and Science in Sports and Exercise
  study_type: consensus
  population: Healthy adults
  conclusions: >
    An American College of Sports Medicine position stand presenting consensus recommendations
    on progression models for resistance training in healthy adults.
  # grading rationale: formal multi-author ACSM position stand (consensus document); graded at
  # the consensus ceiling of moderate.
  evidence_level: moderate
  pmid: "11828249"
  verified: true
